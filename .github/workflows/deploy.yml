name: Deploy T-ARE Website

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Run HTML validation
        run: htmlhint "**/*.html" --config .htmlhintrc || true

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          target: "**/*.html"
          fail: false
          args: --verbose --no-progress

  deploy-production:
    name: Deploy to Production (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tare-website
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-preview:
    name: Deploy Preview (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Preview to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tare-website
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # This creates a preview deployment for the PR
