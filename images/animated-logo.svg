<svg xmlns="http://www.w3.org/2000/svg" width="620" height="90" viewBox="0 0 620 90" fill="none">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
  </defs>

  <!-- Background accent bar -->
  <rect x="0" y="0" width="8" height="90" fill="#F59E0B" rx="2"/>

  <!-- Ascending Gold Bars with Staggered Animation -->
  <!-- Bar 1 -->
  <rect x="25" y="55" width="14" height="25" rx="2" fill="url(#goldGradient)">
    <animate attributeName="height" values="5;25" dur="0.6s" begin="0.1s" fill="freeze"/>
    <animate attributeName="y" values="75;55" dur="0.6s" begin="0.1s" fill="freeze"/>
  </rect>
  
  <!-- Bar 2 -->
  <rect x="45" y="45" width="14" height="35" rx="2" fill="url(#goldGradient)">
    <animate attributeName="height" values="5;35" dur="0.6s" begin="0.25s" fill="freeze"/>
    <animate attributeName="y" values="80;45" dur="0.6s" begin="0.25s" fill="freeze"/>
  </rect>
  
  <!-- Bar 3 (Tallest) -->
  <rect x="65" y="30" width="14" height="50" rx="2" fill="url(#goldGradient)">
    <animate attributeName="height" values="5;50" dur="0.6s" begin="0.4s" fill="freeze"/>
    <animate attributeName="y" values="80;30" dur="0.6s" begin="0.4s" fill="freeze"/>
  </rect>

  <!-- Silver Arrow / Spear -->
  <path d="M95 25 L115 18 L115 35 L95 28 Z" fill="url(#silverGradient)">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.7s" fill="freeze"/>
  </path>

  <!-- T-ARE Text -->
  <text x="135" y="52" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="42" font-weight="900" letter-spacing="-2.5" fill="#0F172A">
    T-ARE
  </text>

  <!-- Tagline -->
  <text x="135" y="72" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="13" font-weight="600" letter-spacing="2.2" fill="#F59E0B">
    TRADING &amp; CONSULTANCY
  </text>
</svg>
